<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Programas de Demografia do Brasil{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="{{ url_for('index') }}" class="nav-logo">Demo<span>Brasil</span></a>
      <ul class="nav-links">
        <li><a href="{{ url_for('programa', id='ufmg') }}">UFMG</a></li>
        <li><a href="{{ url_for('programa', id='unicamp') }}">UNICAMP</a></li>
        <li><a href="{{ url_for('programa', id='ence') }}">ENCE</a></li>
        <li><a href="{{ url_for('programa', id='ufrn') }}">UFRN</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>Programas de Pós-Graduação em Demografia do Brasil &mdash; 2025</p>
  </footer>
</body>
</html>
